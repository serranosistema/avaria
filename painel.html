<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Painel — Brigada de Validade</title>

    <meta name="theme-color" content="#6D28D9" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" type="image/x-icon" href="icons/favicon.ico" />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="icons/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="icons/favicon-16x16.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="icons/apple-touch-icon.png"
    />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/painel.css" />
  </head>
  <body>
    <div
      id="authOverlay"
      style="
        position: fixed;
        inset: 0;
        background: var(--background);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 999;
        color: var(--muted-foreground);
        font-size: 0.9rem;
      "
    >
      Verificando acesso...
    </div>
    <script type="module">
      // trava de acesso real — valida a sessão assinada pelo Neon Auth.
      // Sem sessão válida, ninguém vê o conteúdo desta página nem por um instante.
      import { sessaoValida, logout } from "./js/auth.js";
      const ok = await sessaoValida();
      if (!ok) {
        window.location.href = "index.html";
      } else {
        document.getElementById("authOverlay").remove();
      }

      // logout de verdade — encerra a sessão no Neon, não só localStorage
      document.getElementById("logoutBtn").addEventListener("click", logout);
    </script>

    <header class="appbar">
      <div class="appbar__brand">
        <svg
          width="26"
          height="26"
          viewBox="0 0 26 26"
          fill="none"
          xmlns="http://www.w3.org/2000/svg"
        >
          <rect
            x="2"
            y="4"
            width="2"
            height="18"
            rx="1"
            fill="var(--primary)"
          />
          <rect
            x="6"
            y="4"
            width="1"
            height="18"
            rx="0.5"
            fill="var(--primary)"
          />
          <rect
            x="9"
            y="4"
            width="3"
            height="18"
            rx="1"
            fill="var(--primary)"
          />
          <rect
            x="14"
            y="4"
            width="1"
            height="18"
            rx="0.5"
            fill="var(--primary)"
          />
          <rect
            x="17"
            y="4"
            width="2"
            height="18"
            rx="1"
            fill="var(--primary)"
          />
          <rect
            x="21"
            y="4"
            width="3"
            height="18"
            rx="1"
            fill="var(--primary)"
          />
        </svg>
        <div>
          <div>Painel</div>
          <div class="greeting">Olá, <strong id="funcName">—</strong></div>
        </div>
      </div>

      <div style="display: flex; gap: 0.4rem">
        <button
          class="theme-toggle"
          id="notifBtn"
          type="button"
          aria-label="Ativar notificações"
        >
          <!-- heroicons: bell -->
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M14.857 17.082a23.848 23.848 0 005.454-1.31A8.967 8.967 0 0118 9.75V9A6 6 0 006 9v.75a8.967 8.967 0 01-2.312 6.022c1.733.64 3.56 1.085 5.455 1.31m5.714 0a24.255 24.255 0 01-5.714 0m5.714 0a3 3 0 11-5.714 0"
            />
          </svg>
        </button>
        <button
          class="theme-toggle"
          id="installBtn"
          type="button"
          aria-label="Instalar aplicativo"
        >
          <!-- heroicons: arrow-down-tray -->
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
            />
          </svg>
        </button>
        <a
          class="theme-toggle"
          href="relatorio.html"
          aria-label="Gerar relatório"
          style="text-decoration: none; display: grid; place-items: center"
        >
          <!-- heroicons: document-text -->
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3h7.5m-9-6h.008v.008H6.75v-.008zM6.75 21h10.5a2.25 2.25 0 002.25-2.25V8.25L15 3H6.75A2.25 2.25 0 004.5 5.25v13.5A2.25 2.25 0 006.75 21z"
            />
          </svg>
        </a>
        <button
          class="theme-toggle"
          id="themeToggle"
          type="button"
          aria-label="Alternar tema"
        >
          <svg
            id="iconMoon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
          </svg>
          <svg
            id="iconSun"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="display: none"
          >
            <circle cx="12" cy="12" r="5"></circle>
            <line x1="12" y1="1" x2="12" y2="3"></line>
            <line x1="12" y1="21" x2="12" y2="23"></line>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
            <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
            <line x1="1" y1="12" x2="3" y2="12"></line>
            <line x1="21" y1="12" x2="23" y2="12"></line>
            <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
            <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
          </svg>
        </button>
        <button
          class="theme-toggle"
          id="logoutBtn"
          type="button"
          aria-label="Sair"
        >
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
            <polyline points="16 17 21 12 16 7"></polyline>
            <line x1="21" y1="12" x2="9" y2="12"></line>
          </svg>
        </button>
      </div>
    </header>

    <div class="offline-banner" id="offlineBanner">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
        />
      </svg>
      <span>Sem conexão — seus dados continuam salvos neste aparelho.</span>
    </div>

    <main class="page">
      <div class="alert-banner" id="alertBanner"></div>

      <div class="summary">
        <button
          type="button"
          class="summary__card summary__card--vencido"
          data-status="vencido"
          aria-pressed="false"
        >
          <span class="summary__num" id="summaryVencido">0</span>
          <span class="summary__label">Vencidos</span>
        </button>
        <button
          type="button"
          class="summary__card summary__card--atencao"
          data-status="atencao"
          aria-pressed="false"
        >
          <span class="summary__num" id="summaryAtencao">0</span>
          <span class="summary__label">Atenção</span>
        </button>
        <button
          type="button"
          class="summary__card summary__card--ok"
          data-status="ok"
          aria-pressed="false"
        >
          <span class="summary__num" id="summaryOk">0</span>
          <span class="summary__label">Ok</span>
        </button>
      </div>

      <div class="filters">
        <input
          type="text"
          id="searchInput"
          placeholder="Buscar por código ou descrição..."
        />
        <select id="corredorFilter">
          <option value="">Todos locais/categorias</option>
        </select>
      </div>

      <button type="button" class="clear-filters" id="clearFilters">
        Limpar filtros
      </button>

      <div class="list" id="list"></div>

      <div class="empty-state" id="emptyState">
        <svg
          width="40"
          height="40"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <rect x="3" y="7" width="18" height="13" rx="2"></rect>
          <path d="M8 7V5a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path>
        </svg>
        <p>
          Nenhum item registrado ainda.<br />Bipe um produto ou adicione
          manualmente.
        </p>
      </div>
    </main>

    <div class="fabs">
      <button class="fab fab--secondary" id="openAddModal" type="button">
        + Manual
      </button>
      <a
        class="fab fab--primary"
        href="scanner.html"
        style="text-decoration: none"
      >
        Bipar produto
      </a>
    </div>

    <!-- Modal de cadastro manual -->
    <div class="modal-overlay" id="modalOverlay">
      <div class="modal">
        <div class="modal__header">
          <h2 id="modalTitle">Adicionar item manualmente</h2>
          <button
            type="button"
            class="modal__close"
            id="closeAddModalX"
            aria-label="Fechar"
          >
            <svg
              width="18"
              height="18"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="18" y1="6" x2="6" y2="18"></line>
              <line x1="6" y1="6" x2="18" y2="18"></line>
            </svg>
          </button>
        </div>
        <form id="addForm">
          <div class="modal-row">
            <div class="field">
              <label for="fCorredor">Local ou categoria (opcional)</label>
              <input
                type="text"
                id="fCorredor"
                placeholder="Ex: Padaria, A3..."
              />
            </div>
            <div class="field">
              <label for="fCodigo">Código</label>
              <input
                type="text"
                id="fCodigo"
                placeholder="Ex: 7891000"
                required
              />
            </div>
          </div>

          <div class="field">
            <label for="fDescricao">Descrição</label>
            <input
              type="text"
              id="fDescricao"
              placeholder="Ex: Leite Integral 1L"
              required
            />
          </div>

          <div class="modal-row">
            <div class="field">
              <label for="fQuantidade">Quantidade</label>
              <input
                type="number"
                id="fQuantidade"
                min="0"
                value="1"
                required
              />
            </div>
            <div class="field">
              <label for="fValidade">Validade</label>
              <input type="date" id="fValidade" required />
            </div>
          </div>

          <div class="modal-actions">
            <button type="button" class="btn btn--ghost" id="closeAddModal">
              Cancelar
            </button>
            <button type="submit" class="btn btn--primary">Salvar</button>
          </div>
        </form>
      </div>
    </div>

    <script src="js/storage-local.js"></script>
    <script type="module" src="js/sync.js"></script>
    <script type="module" src="js/push.js"></script>
    <script src="js/confirm.js"></script>
    <script src="js/painel.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("service-worker.js").catch(() => {});
        });
      }
    </script>
    <script src="js/offline-status.js"></script>
    <script src="js/pwa-install.js"></script>
  </body>
</html>
