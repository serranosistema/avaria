<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1"
    />
    <title>Relatório — Brigada de Validade</title>

    <meta name="theme-color" content="#6D28D9" />
    <link rel="manifest" href="manifest.json" />
    <link rel="apple-touch-icon" href="/icons/android-chrome-192x192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />

    <link rel="stylesheet" href="css/style.css" />
    <link rel="stylesheet" href="css/relatorio.css" />
  </head>
  <body>
    <header class="appbar">
      <div class="appbar__brand">
        <a
          href="painel.html"
          class="theme-toggle"
          aria-label="Voltar ao painel"
          style="margin-right: 0.3rem"
        >
          <!-- heroicons: arrow-left -->
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18" />
          </svg>
        </a>
        <span>Relatório</span>
      </div>

      <div style="display: flex; gap: 0.4rem">
        <button
          class="theme-toggle"
          id="installBtn"
          type="button"
          aria-label="Instalar aplicativo"
        >
          <!-- heroicons: arrow-down-tray -->
          <svg
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
            />
          </svg>
        </button>
        <button
          class="theme-toggle"
          id="themeToggle"
          type="button"
          aria-label="Alternar tema"
        >
          <!-- heroicons: moon -->
          <svg
            id="iconMoon"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
          >
            <path
              d="M21.752 15.002A9.718 9.718 0 0118 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 003 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 009.002-5.998z"
            />
          </svg>
          <!-- heroicons: sun -->
          <svg
            id="iconSun"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.5"
            stroke-linecap="round"
            stroke-linejoin="round"
            style="display: none"
          >
            <path
              d="M12 3v2.25m6.364.386l-1.591 1.591M21 12h-2.25m-.386 6.364l-1.591-1.591M12 18.75V21m-4.773-4.227l-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 11-7.5 0 3.75 3.75 0 017.5 0z"
            />
          </svg>
        </button>
      </div>
    </header>

    <div class="offline-banner" id="offlineBanner">
      <svg
        viewBox="0 0 24 24"
        fill="none"
        stroke="currentColor"
        stroke-width="1.5"
        stroke-linecap="round"
        stroke-linejoin="round"
      >
        <path
          d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z"
        />
      </svg>
      <span>Sem conexão — seus dados continuam salvos neste aparelho.</span>
    </div>

    <main class="page">
      <div class="filter-card">
        <div class="modal-row">
          <div class="field">
            <label for="dataDe">De</label>
            <input type="date" id="dataDe" />
          </div>
          <div class="field">
            <label for="dataAte">Até</label>
            <input type="date" id="dataAte" />
          </div>
          <div class="field">
            <label for="corredorFilter">Corredor</label>
            <select id="corredorFilter">
              <option value="">Todos</option>
            </select>
          </div>
        </div>
        <div class="quick-dates">
          <button type="button" class="chip" id="chipHoje">Hoje</button>
          <button type="button" class="chip" id="chipOntem">Ontem</button>
          <button type="button" class="chip" id="chip7dias">
            Últimos 7 dias
          </button>
        </div>
      </div>

      <div class="summary">
        <div class="summary__card">
          <span class="summary__num" id="summaryTotal">0</span>
          <span class="summary__label">Itens no período</span>
        </div>
        <div class="summary__card summary__card--vencido">
          <span class="summary__num" id="summaryVencido">0</span>
          <span class="summary__label">Vencidos</span>
        </div>
        <div class="summary__card summary__card--atencao">
          <span class="summary__num" id="summaryAtencao">0</span>
          <span class="summary__label">Atenção</span>
        </div>
      </div>

      <p class="section-title">Itens conferidos</p>
      <div class="list" id="list"></div>

      <div class="empty-state" id="emptyState">
        <svg
          width="36"
          height="36"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3h7.5m-9-6h.008v.008H6.75v-.008zM6.75 21h10.5a2.25 2.25 0 002.25-2.25V8.25L15 3H6.75A2.25 2.25 0 004.5 5.25v13.5A2.25 2.25 0 006.75 21z"
          />
        </svg>
        <p>Nenhum item bipado no período selecionado.</p>
      </div>

      <p class="section-title">Conferência</p>
      <div class="sign-card">
        <div class="field">
          <label for="conferidoPor">Conferido por</label>
          <input
            type="text"
            id="conferidoPor"
            placeholder="Nome de quem está assinando"
          />
        </div>
        <div class="field">
          <label for="observacoes">Observações (opcional)</label>
          <textarea
            id="observacoes"
            rows="2"
            placeholder="Ex: corredor B2 sem estoque suficiente pra conferir"
          ></textarea>
        </div>
        <div class="field" style="margin-bottom: 0">
          <label>Assinatura</label>
          <div class="sign-pad-wrap">
            <canvas id="signaturePad"></canvas>
          </div>
          <div class="sign-actions">
            <span class="sign-hint">Assine com o dedo na tela</span>
            <button type="button" class="link-btn" id="clearSign">
              <!-- heroicons: trash -->
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="1.5"
                stroke-linecap="round"
                stroke-linejoin="round"
              >
                <path
                  d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"
                />
              </svg>
              Limpar
            </button>
          </div>
        </div>
      </div>
    </main>

    <div class="actions-bar">
      <button type="button" class="btn btn--secondary" id="exportCsv">
        <!-- heroicons: arrow-down-tray -->
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M3 16.5v2.25A2.25 2.25 0 005.25 21h13.5A2.25 2.25 0 0021 18.75V16.5M16.5 12L12 16.5m0 0L7.5 12m4.5 4.5V3"
          />
        </svg>
        CSV
      </button>
      <button type="button" class="btn btn--primary" id="exportPdf">
        <!-- heroicons: document-text -->
        <svg
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.5"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <path
            d="M19.5 14.25v-2.625a3.375 3.375 0 00-3.375-3.375h-1.5A1.125 1.125 0 0113.5 7.125v-1.5a3.375 3.375 0 00-3.375-3.375H8.25m0 12.75h7.5m-7.5 3h7.5m-9-6h.008v.008H6.75v-.008zM6.75 21h10.5a2.25 2.25 0 002.25-2.25V8.25L15 3H6.75A2.25 2.25 0 004.5 5.25v13.5A2.25 2.25 0 006.75 21z"
          />
        </svg>
        Gerar PDF
      </button>
    </div>

    <script src="https://unpkg.com/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://unpkg.com/jspdf-autotable@3.8.2/dist/jspdf.plugin.autotable.js"></script>
    <script src="https://unpkg.com/signature_pad@4.1.7/dist/signature_pad.umd.min.js"></script>
    <script src="js/storage-local.js"></script>
    <script src="js/relatorio.js"></script>
    <script>
      if ("serviceWorker" in navigator) {
        window.addEventListener("load", () => {
          navigator.serviceWorker.register("service-worker.js").catch(() => {});
        });
      }
    </script>
    <script src="js/offline-status.js"></script>
    <script src="js/pwa-install.js"></script>
  </body>
</html>
